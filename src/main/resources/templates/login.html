<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DOJODAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* FUNDO COM FOCO NA IMAGEM */
        .bg-login {
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                              url('/img/segunda.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD MENOR E COM BRILHO (GLASSMORPHISM PREMIUM) */
        .card-login {
            width: 90%;
            max-width: 360px; /* Reduzido de 420px para 360px */
            padding: 20px;
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            /* Borda com efeito de brilho */
            border: 1px solid rgba(255, 255, 255, 0.25); 
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
            color: #ffffff;
        }

        /* TEXTO DOJODAN COM BRILHO SUTIL */
        .card-login h2 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            margin-bottom: 1.5rem;
        }

        .logo-bjj {
            color: #ffffff;
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            margin-bottom: 5px;
        }

        /* INPUTS MAIS "VIVOS" */
        .input-group-text {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            font-size: 0.95rem;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        /* Efeito de brilho ao clicar no input */
        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2) !important;
            border-color: rgba(255, 255, 255, 0.8) !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            color: white !important;
        }

        /* BOTÃO BRANCO PURO (ALTO BRILHO) */
        .btn-primary {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 10px;
            font-weight: 800;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            background: #f8f9fa;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.5);
        }

        .link-muted {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .link-muted:hover {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="bg-login">
        <div class="card card-login border-0">
            <div class="card-body text-center p-2">
                
                <div class="logo-bjj">
                    <i class="bi bi-shield-check"></i>
                </div>
                
                <h2 class="fw-bold">DOJODAN</h2>
                
                <form th:action="@{/login}" method="post" class="text-start">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase opacity-75">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="username" class="form-control" placeholder="seu@email.com" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase opacity-75">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        ENTRAR NO TATAME
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/recuperar-senha}" class="text-decoration-none link-muted">
                        Esqueci minha senha
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
