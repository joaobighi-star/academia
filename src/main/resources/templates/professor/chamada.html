<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registro de presença e chamada das turmas de Jiu-Jitsu com visualização de fotos.">
    <title>Chamada - [[${turma.nome}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bjj-blue: #0056b3; }
        .table-chamada th { background-color: #212529; color: white; border: none; }
        .row-aluno:hover { background-color: #f1f3f5; }
        
        /* Foto miniatura */
        .img-aluno-thumb { 
            width: 48px; height: 48px; object-fit: cover; 
            cursor: pointer; border-radius: 50%; border: 2px solid #dee2e6;
            transition: transform 0.2s;
        }
        .img-aluno-thumb:hover { transform: scale(1.1); border-color: var(--bjj-blue); }

        /* Estilo do Checkbox de Presença (Maior e Visível) */
        .form-check-input {
            width: 1.8em; height: 1.8em; cursor: pointer;
            border: 2px solid #6c757d; /* Borda mais escura para contraste */
        }
        .form-check-input:checked {
            background-color: #198754; border-color: #198754;
        }

        /* Label clicável para o aluno */
        .label-presenca { cursor: pointer; display: block; width: 100%; }

        /* Overlay de imagem */
        #imageOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; cursor: zoom-out;
            justify-content: center; align-items: center;
        }
        #imageOverlay img { max-width: 90%; max-height: 90%; border: 4px solid white; border-radius: 8px; }
    </style>
</head>
<body class="bg-light container py-4">

    <div id="imageOverlay" onclick="this.style.display='none'" aria-hidden="true">
        <img id="expandedImg" src="" alt="Foto ampliada">
    </div>

    <header class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded border-bottom">
        <div>
            <h1 class="h4 mb-0 text-primary fw-bold">Chamada: <span th:text="${turma.nome}"></span></h1>
            <small class="text-dark fw-medium"><i class="bi bi-clock"></i> Horário: <span th:text="${turma.horario}"></span></small>
        </div>
        <a th:href="@{/professor/painel}" class="btn btn-outline-dark btn-sm fw-bold">Voltar ao Painel</a>
    </header>

    <main class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/professor/registrar-presenca}" method="post">
                <input type="hidden" name="turmaId" th:value="${turma.id}">
                
                <div class="mb-4 col-md-4">
                    <label for="dataAula" class="form-label fw-bold text-dark">Data da Aula:</label>
                    <input type="date" id="dataAula" name="dataAula" class="form-control shadow-sm" 
                           th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle table-chamada">
                        <thead>
                            <tr>
                                <th scope="col">Foto</th>
                                <th scope="col">Aluno</th>
                                <th scope="col">Faixa</th>
                                <th scope="col">Progresso</th>
                                <th scope="col" class="text-center">Presença</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="aluno : ${alunos}" class="row-aluno">
                                <td>
                                    <img th:src="@{/aluno/foto/{id}(id=${aluno.id})}" 
                                         class="img-aluno-thumb shadow-sm" 
                                         th:alt="'Foto de ' + ${aluno.nome}"
                                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';"
                                         th:onclick="|ampliarFoto(this.src)|">
                                </td>
                                <td>
                                    <label th:for="'check-' + ${aluno.id}" class="label-presenca">
                                        <span class="fw-bold text-dark d-block" th:text="${aluno.nome}"></span>
                                        <small class="text-muted">Clique para marcar</small>
                                    </label>
                                </td>
                                <td>
                                    <span class="badge bg-dark px-3" th:text="${aluno.faixa}"></span>
                                </td>
                                <td>
                                    <div class="progress mb-1" style="height: 10px; width: 100px;" role="progressbar" 
                                         th:aria-valuenow="${aluno.percentualProgresso}" aria-valuemin="0" aria-valuemax="100">
                                        <div class="progress-bar bg-success" 
                                             th:style="'width: ' + ${aluno.percentualProgresso} + '%'"></div>
                                    </div>
                                    <small class="fw-bold text-dark" th:text="${#numbers.formatDecimal(aluno.percentualProgresso, 0, 0)} + '%'"></small>
                                </td>
                                <td class="text-center">
                                    <div class="form-check d-inline-block">
                                        <input class="form-check-input shadow-sm" type="checkbox" 
                                               name="alunoIds" th:value="${aluno.id}" 
                                               th:id="'check-' + ${aluno.id}"
                                               th:aria-label="'Marcar presença para ' + ${aluno.nome}">
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4 border-top pt-3 text-end">
                    <button type="submit" class="btn btn-success btn-lg px-5 fw-bold shadow">
                        <i class="bi bi-check-circle"></i> SALVAR CHAMADA
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function ampliarFoto(src) {
            const overlay = document.getElementById('imageOverlay');
            const img = document.getElementById('expandedImg');
            img.src = src;
            overlay.style.display = 'flex';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
