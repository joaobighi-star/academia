<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Chamada - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Cores de faixa para facilitar a batida de olho */
        .faixa-badge-BRANCA { background-color: #fff; color: #333; border: 1px solid #ccc; }
        .faixa-badge-AZUL { background-color: #0000FF; color: #fff; }
        .faixa-badge-ROXA { background-color: #800080; color: #fff; }
        .faixa-badge-MARROM { background-color: #8B4513; color: #fff; }
        .faixa-badge-PRETA { background-color: #000; color: #fff; }
        
        /* Estilo da foto na tabela */
        .img-aluno-chamada {
            width: 55px;
            height: 55px;
            object-fit: cover;
            border: 2px solid #dee2e6;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .img-aluno-chamada:hover {
            transform: scale(1.1);
            border-color: #0d6efd;
        }

        /* Estilo para o Modal de Foto */
        .modal-content-foto {
            background-color: transparent !important;
            border: none !important;
        }
        #nomeAlunoModal {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light container py-4">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <div>
                <h4 class="mb-0"><i class="bi bi-card-checklist"></i> <span th:text="'Chamada: ' + ${turma.nome}">Turma</span></h4>
                <small th:text="${turma.horario} + ' - Prof. ' + ${turma.professorResponsavel.nome}"></small>
            </div>
            <a th:href="@{/professor/painel}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left"></i> Voltar ao Painel
            </a>
        </div>
        <div class="card-body">
            <form th:action="@{/professor/chamada/salvar}" method="post">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th width="70px" class="text-center">Presença</th>
                            <th width="80px">Foto</th>
                            <th>Aluno / Graduação</th>
                            <th class="text-center">Frequência</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${alunos}">
                            <td class="text-center">
                                <input type="checkbox" name="alunosPresentes" th:value="${a.id}" 
                                       class="form-check-input" style="width: 28px; height: 28px; cursor: pointer;">
                            </td>
                            <td>
                                <img th:src="@{/aluno/foto/{id}(id=${a.id})}" 
                                     class="rounded-circle img-aluno-chamada shadow-sm"
                                     th:data-url="@{/aluno/foto/{id}(id=${a.id})}"
                                     th:data-nome="${a.nome}"
                                     onclick="abrirZoom(this)"
                                     onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
                            </td>
                            <td>
                                <strong class="fs-6" th:text="${a.nome}">Nome</strong><br>
                                <span th:class="'badge faixa-badge-' + ${a.faixa}" 
                                      th:text="${a.faixa}">Faixa</span>
                                
                                <small th:if="${a.nomeResponsavel != null and a.nomeResponsavel != ''}" class="text-muted d-block mt-1">
                                    <i class="bi bi-person-hearts"></i> <span th:text="${a.nomeResponsavel}"></span>
                                </small>
                            </td>
                            <td class="text-center">
                                <div class="small text-muted mb-1">Aulas assistidas</div>
                                <span class="badge rounded-pill bg-info text-dark px-3" 
                                      th:text="${a.aulasAssistidas}">0</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(alunos)}">
                            <td colspan="4" class="text-center text-muted py-5">
                                <i class="bi bi-info-circle fs-2"></i><br>
                                Nenhum aluno matriculado nesta turma.
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success btn-lg shadow py-3 fw-bold">
                        <i class="bi bi-check2-all"></i> SALVAR CHAMADA E SOMAR AULAS
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal fade" id="modalZoom" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-foto">
                <div class="modal-body text-center p-0 position-relative">
                    <h5 id="nomeAlunoModal" class="text-white mb-3"></h5>
                    <img src="" id="imgZoom" class="img-fluid rounded shadow-lg" style="max-height: 80vh; border: 3px solid white;">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-2" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        function abrirZoom(elemento) {
            // Pega os dados dos atributos data-
            const url = elemento.getAttribute('data-url');
            const nome = elemento.getAttribute('data-nome');

            // Aplica ao Modal
            document.getElementById('imgZoom').src = url;
            document.getElementById('nomeAlunoModal').innerText = nome;
            
            // Abre o modal
            var meuModal = new bootstrap.Modal(document.getElementById('modalZoom'));
            meuModal.show();
        }
    </script>
</body>
</html>
