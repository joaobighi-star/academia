<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lista de chamada para turmas de Jiu-Jitsu. Registre a presença dos alunos e atualize automaticamente a contagem de aulas para graduação.">
    <title>Lista de Chamada - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* 3. Ajuste de Contraste para Acessibilidade (WCAG AA) */
        .faixa-badge-BRANCA { background-color: #f8f9fa; color: #212529; border: 1px solid #adb5bd; }
        .faixa-badge-AZUL { background-color: #0d6efd; color: #fff; } /* Azul Bootstrap tem melhor contraste */
        .faixa-badge-ROXA { background-color: #6f42c1; color: #fff; }
        .faixa-badge-MARROM { background-color: #795548; color: #fff; }
        .faixa-badge-PRETA { background-color: #212529; color: #fff; }
        
        .img-aluno-chamada {
            width: 55px; height: 55px; object-fit: cover;
            border: 2px solid #dee2e6; cursor: pointer; transition: transform 0.2s;
        }
        .img-aluno-chamada:hover { transform: scale(1.1); border-color: #0d6efd; }
        .modal-content-foto { background-color: transparent !important; border: none !important; }
        #nomeAlunoModal { text-shadow: 2px 2px 4px rgba(0,0,0,0.8); font-weight: bold; }
    </style>
</head>
<body class="bg-light container py-4">
    <main class="card shadow border-0">
        <header class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h4 mb-0">
                    <i class="bi bi-card-checklist" aria-hidden="true"></i> 
                    <span th:text="'Chamada: ' + ${turma.nome}">Turma</span>
                </h1>
                <small th:text="${turma.horario} + ' - Prof. ' + ${turma.professorResponsavel.nome}"></small>
            </div>
            <a th:href="@{/professor/painel}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left" aria-hidden="true"></i> Voltar ao Painel
            </a>
        </header>
        
        <div class="card-body">
            <form th:action="@{/professor/chamada/salvar}" method="post">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <caption class="visually-hidden">Lista de alunos para marcação de presença</caption>
                        <thead class="table-light">
                            <tr>
                                <th scope="col" width="70px" class="text-center">Presença</th>
                                <th scope="col" width="80px">Foto</th>
                                <th scope="col">Aluno / Graduação</th>
                                <th scope="col" class="text-center">Frequência</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="a : ${alunos}">
                                <td class="text-center">
                                    <input type="checkbox" name="alunosPresentes" th:value="${a.id}" 
                                           th:id="'presenca-' + ${a.id}"
                                           th:aria-label="'Presença para ' + ${a.nome}"
                                           class="form-check-input" style="width: 28px; height: 28px; cursor: pointer;">
                                </td>
                                <td>
                                    <img th:src="@{/aluno/foto/{id}(id=${a.id})}" 
                                         class="rounded-circle img-aluno-chamada shadow-sm"
                                         th:alt="'Foto de ' + ${a.nome}"
                                         th:data-url="@{/aluno/foto/{id}(id=${a.id})}"
                                         th:data-nome="${a.nome}"
                                         onclick="abrirZoom(this)"
                                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
                                </td>
                                <td>
                                    <strong class="fs-6" th:text="${a.nome}">Nome</strong><br>
                                    <span th:class="'badge faixa-badge-' + ${a.faixa}" 
                                          th:text="${a.faixa}">Faixa</span>
                                    
                                    <small th:if="${a.nomeResponsavel != null and a.nomeResponsavel != ''}" class="text-muted d-block mt-1">
                                        <i class="bi bi-person-hearts" aria-hidden="true"></i> 
                                        Responsável: <span th:text="${a.nomeResponsavel}"></span>
                                    </small>
                                </td>
                                <td class="text-center">
                                    <div class="small text-muted mb-1">Aulas assistidas</div>
                                    <span class="badge rounded-pill bg-dark text-white px-3" 
                                          th:text="${a.aulasAssistidas}">0</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(alunos)}">
                                <td colspan="4" class="text-center text-muted py-5" role="status">
                                    <i class="bi bi-info-circle fs-2" aria-hidden="true"></i><br>
                                    Nenhum aluno matric
