<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Registro de presença e chamada das turmas de Jiu-Jitsu com visualização de fotos.">
    <title>Chamada - <span th:text="${turma.nome}"></span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .table-chamada th { background-color: #212529; color: white; }
        .row-aluno:hover { background-color: #f8f9fa; }
        
        /* Estilo para a foto miniatura */
        .img-aluno-thumb { 
            width: 45px; height: 45px; object-fit: cover; 
            cursor: pointer; border-radius: 50%; border: 2px solid #dee2e6;
            transition: transform 0.2s;
        }
        .img-aluno-thumb:hover { transform: scale(1.1); border-color: #0d6efd; }

        /* Estilo para o efeito de ampliação (Overlay) */
        #imageOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; cursor: zoom-out;
            justify-content: center; align-items: center;
        }
        #imageOverlay img { max-width: 90%; max-height: 90%; border: 5px solid white; border-radius: 10px; }
    </style>
</head>
<body class="bg-light container py-4">

    <div id="imageOverlay" onclick="this.style.display='none'">
        <img id="expandedImg" src="" alt="Foto ampliada">
    </div>

    <header class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white shadow-sm rounded">
        <div>
            <h1 class="h4 mb-0 text-primary fw-bold">Chamada: <span th:text="${turma.nome}"></span></h1>
            <small class="text-muted"><i class="bi bi-clock"></i> Horário: <span th:text="${turma.horario}"></span></small>
        </div>
        <a th:href="@{/professor/painel}" class="btn btn-outline-secondary btn-sm">Voltar ao Painel</a>
    </header>

    <main class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/professor/registrar-presenca}" method="post">
                <input type="hidden" name="turmaId" th:value="${turma.id}">
                
                <div class="mb-4 col-md-4">
                    <label for="dataAula" class="form-label fw-bold">Data da Aula:</label>
                    <input type="date" id="dataAula" name="dataAula" class="form-control" 
                           th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle table-chamada">
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>Aluno</th>
                                <th>Faixa</th>
                                <th>Progresso</th>
                                <th class="text-center">Presença</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="aluno : ${alunos}" class="row-aluno">
                                <td>
                                    <img th:src="@{/aluno/foto/{id}(id=${aluno.id})}" 
                                         class="img-aluno-thumb" 
                                         alt="Foto do aluno"
                                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';"
                                         th:onclick="|ampliarFoto(this.src)|">
                                </td>
                                <td>
                                    <span class="fw-bold text-dark" th:text="${aluno.nome}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-dark" th:text="${aluno.faixa}"></span>
                                </td>
                                <td>
                                    <div class="progress" style="height: 8px; width: 80px;">
                                        <div class="progress-bar bg-success" 
                                             th:style="'width: ' + ${aluno.percentualProgresso} + '%'"></div>
                                    </div>
                                    <small class="text-muted" th:text="${#numbers.formatDecimal(aluno.percentualProgresso, 0, 0)} + '%'"></small>
                                </td>
                                <td class="text-center">
                                    <div class="form-check d-inline-block">
                                        <input class="form-check-input" type="checkbox" 
                                               name="alunoIds" th:value="${aluno.id}" 
                                               style="width: 1.5em; height: 1.5em;">
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="mt-4 border-top pt-3 text-end">
                    <button type="submit" class="btn btn-success px-5 fw-bold shadow-sm">
                        <i class="bi bi-check-circle"></i> SALVAR PRESENÇAS
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        function ampliarFoto(src) {
            const overlay = document.getElementById('imageOverlay');
            const img = document.getElementById('expandedImg');
            img.src = src;
            overlay.style.display = 'flex';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
