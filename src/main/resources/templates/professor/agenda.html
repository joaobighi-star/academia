<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minha Agenda BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .grid-cell { min-width: 120px; transition: all 0.2s; }
        .btn-available { background-color: #d1e7dd !important; border-color: #badbcc !important; color: #0f5132 !important; }
        .btn-available:hover { background-color: #badbcc !important; transform: scale(1.02); }
        .btn-closed { background-color: #f8f9fa !important; border-color: #dee2e6 !important; color: #6c757d !important; border-style: dashed !important; }
        .btn-closed:hover { background-color: #e2e6ea !important; color: #495057 !important; }
        .btn-reserved { background-color: #cfe2ff !important; border-color: #b6d4fe !important; color: #084298 !important; cursor: not-allowed; opacity: 0.9; }
    </style>
</head>
<body class="bg-light container py-4">

    <div class="card shadow-sm mb-4 border-0">
        <div class="card-body d-flex justify-content-between align-items-center bg-dark text-white rounded">
            <div>
                <h4 class="mb-0"><i class="bi bi-calendar3"></i> Gestão de Horários</h4>
                <p class="small mb-0 text-secondary">Gerencie a disponibilidade para os alunos</p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/professor/agenda(dataBase=${semanaAnterior})}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-chevron-left"></i> Anterior
                </a>
                <a th:href="@{/professor/agenda(dataBase=${proximaSemana})}" class="btn btn-outline-light btn-sm">
                    Próxima <i class="bi bi-chevron-right"></i>
                </a>
                <a href="/professor/painel" class="btn btn-primary btn-sm ms-2">Painel Principal</a>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm rounded bg-white p-3">
        <table class="table table-bordered text-center align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 100px;">Hora</th>
                    <th th:each="dia : ${dias}" class="py-2">
                        <span class="d-block fw-bold" th:text="${#temporals.format(dia, 'EEE')}"></span>
                        <small class="text-muted" th:text="${#temporals.format(dia, 'dd/MM')}"></small>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${horas}">
                    <td class="fw-bold bg-light text-muted small" th:text="${h + ':00'}"></td>
                    
                    <td th:each="dia : ${dias}" class="grid-cell p-1">
                        
                        <div th:with="vaga=${disponibilidades.?[data.toString() == '__${dia.toString()}__' && hora == __${h}__]}">
                            
                            <div th:if="${not #lists.isEmpty(vaga)}">
                                <form th:action="@{/professor/agenda/alternar}" method="post">
                                    <input type="hidden" name="data" th:value="${dia}">
                                    <input type="hidden" name="hora" th:value="${h}">
                                    
                                    <button type="submit" 
                                            th:class="${vaga[0].reservado} ? 'btn btn-sm btn-reserved w-100 py-2' : 'btn btn-sm btn-available w-100 py-2'"
                                            th:disabled="${vaga[0].reservado}">
                                        <i th:if="${vaga[0].reservado}" class="bi bi-person-check-fill"></i>
                                        <i th:unless="${vaga[0].reservado}" class="bi bi-unlock"></i>
                                        <span class="d-block small" th:text="${vaga[0].reservado} ? 'Reservado' : 'Aberto'"></span>
                                    </button>
                                </form>
                            </div>

                            <div th:if="${#lists.isEmpty(vaga)}">
                                <form th:action="@{/professor/agenda/alternar}" method="post">
                                    <input type="hidden" name="data" th:value="${dia}">
                                    <input type="hidden" name="hora" th:value="${h}">
                                    <button type="submit" class="btn btn-sm btn-closed w-100 py-2">
                                        <i class="bi bi-plus-lg d-block"></i>
                                        <span class="small">Abrir</span>
                                    </button>
                                </form>
                            </div>

                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 d-flex gap-4 justify-content-center text-muted">
        <small><i class="bi bi-plus-lg"></i> <b>Abrir:</b> Horário vago</small>
        <small><i class="bi bi-unlock text-success"></i> <b>Aberto:</b> Disponível</small>
        <small><i class="bi bi-person-check-fill text-primary"></i> <b>Reservado:</b> Com aluno</small>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
