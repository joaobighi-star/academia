<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestão de agenda BJJ para professores. Abra novos horários, visualize reservas de alunos e organize suas aulas de jiu-jitsu.">
    <title>Minha Agenda BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* 3. Ajuste de Contraste para Acessibilidade */
        .grid-cell { min-width: 120px; transition: all 0.2s; }
        .btn-available { background-color: #d1e7dd !important; border-color: #0f5132 !important; color: #0f5132 !important; }
        .btn-available:hover { background-color: #badbcc !important; transform: scale(1.02); }
        .btn-closed { background-color: #ffffff !important; border: 2px dashed #555 !important; color: #444 !important; }
        .btn-closed:hover { background-color: #f1f3f5 !important; color: #000 !important; }
        .btn-reserved { background-color: #084298 !important; border-color: #084298 !important; color: #ffffff !important; cursor: not-allowed; }
        .text-muted-dark { color: #555 !important; }
    </style>
</head>
<body class="bg-light container py-4">

    <main>
        <div class="card shadow-sm mb-4 border-0">
            <header class="card-body d-flex justify-content-between align-items-center bg-dark text-white rounded">
                <div>
                    <h1 class="h4 mb-0"><i class="bi bi-calendar3" aria-hidden="true"></i> Gestão de Horários</h1>
                </div>
                <nav class="d-flex gap-2" aria-label="Navegação de semanas">
                    <a th:href="@{/professor/agenda(dataBase=${semanaAnterior})}" class="btn btn-outline-light btn-sm" aria-label="Semana anterior">
                        <i class="bi bi-chevron-left" aria-hidden="true"></i> Anterior
                    </a>
                    <a th:href="@{/professor/agenda(dataBase=${proximaSemana})}" class="btn btn-outline-light btn-sm" aria-label="Próxima semana">
                        Próxima <i class="bi bi-chevron-right" aria-hidden="true"></i>
                    </a>
                    <a href="/professor/painel" class="btn btn-primary btn-sm ms-2">Painel Principal</a>
                </nav>
            </header>
        </div>

        <div class="table-responsive shadow-sm rounded bg-white p-3">
            <table class="table table-bordered text-center align-middle mb-0">
                <caption class="visually-hidden">Grade de horários semanal para aulas de jiu-jitsu</caption>
                <thead class="table-light">
                    <tr>
                        <th scope="col" style="width: 100px;">Hora</th>
                        <th th:each="dia : ${dias}" scope="col" class="py-2">
                            <span class="d-block fw-bold" th:text="${#temporals.format(dia, 'EEE')}"></span>
                            <small class="text-muted-dark" th:text="${#temporals.format(dia, 'dd/MM')}"></small>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="h : ${horas}">
                        <th scope="row" class="fw-bold bg-light text-muted-dark small" th:text="${h + ':00'}"></th>
                        
                        <td th:each="dia : ${dias}" class="grid-cell p-1">
                            <div th:with="vaga=${disponibilidades.?[data.toString() == '__${dia.toString()}__' && hora == __${h}__]}">
                                
                                <div th:if="${not #lists.isEmpty(vaga)}">
                                    <form th:action="@{/professor/agenda/alternar}" method="post">
                                        <input type="hidden" name="data" th:value="${dia}">
                                        <input type="hidden" name="hora" th:value="${h}">
                                        
                                        <button type="submit" 
                                                th:class="${vaga[0].reservado} ? 'btn btn-sm btn-reserved w-100 py-2' : 'btn btn-sm btn-available w-100 py-2'"
                                                th:disabled="${vaga[0].reservado}"
                                                th:aria-label="${vaga[0].reservado ? 'Horário reservado em ' + dia + ' às ' + h + ':00' : 'Fechar horário de ' + dia + ' às ' + h + ':00'}">
                                            <i th:if="${vaga[0].reservado}" class="bi bi-person-check-fill" aria-hidden="true"></i>
                                            <i th:unless="${vaga[0].reservado}" class="bi bi-unlock" aria-hidden="true"></i>
                                            <span class="d-block small" th:text="${vaga[0].reservado} ? 'Reservado' : 'Aberto'"></span>
                                        </button>
                                    </form>
                                </div>

                                <div th:if="${#lists.isEmpty(vaga)}">
                                    <form th:action="@{/professor/agenda/alternar}" method="post">
                                        <input type="hidden" name="data" th:value="${dia}">
                                        <input type="hidden" name="hora" th:value="${h}">
                                        <button type="submit" class="btn btn-sm btn-closed w-100 py-2"
                                                th:aria-label="'Abrir horário em ' + dia + ' às ' + h + ':00'">
                                            <i class="bi bi-plus-lg d-block" aria-hidden="true"></i>
                                            <span class="small">Abrir</span>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 d-flex gap-4 justify-content-center text-muted-dark" aria-hidden="true">
            <small><i class="bi bi-plus-lg"></i> <b>Abrir:</b> Horário vago</small>
            <small><i class="bi bi-unlock text-success"></i> <b>Aberto:</b> Disponível</small>
            <small><i class="bi bi-person-check-fill text-primary"></i> <b>Reservado:</b> Com aluno</small>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
