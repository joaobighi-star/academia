<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minha Agenda BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .grid-cell { min-width: 120px; transition: all 0.2s; }
        .btn-available { background-color: #d1e7dd; border-color: #badbcc; color: #0f5132; }
        .btn-available:hover { background-color: #badbcc; }
        .btn-closed { background-color: #f8f9fa; border-color: #dee2e6; color: #6c757d; }
        .btn-closed:hover { background-color: #e2e6ea; color: #495057; }
        .btn-reserved { background-color: #cfe2ff; border-color: #b6d4fe; color: #084298; cursor: not-allowed; }
    </style>
</head>
<body class="bg-light container py-4">

    <div class="card shadow-sm mb-4 border-0">
        <div class="card-body d-flex justify-content-between align-items-center bg-dark text-white rounded">
            <div>
                <h4 class="mb-0"><i class="bi bi-calendar3"></i> Minha Disponibilidade</h4>
                <small class="text-secondary">Clique nos horários para abrir ou fechar sua agenda particular</small>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/professor/agenda(dataBase=${semanaAnterior})}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-chevron-left"></i> Semana Anterior
                </a>
                <a th:href="@{/professor/agenda(dataBase=${proximaSemana})}" class="btn btn-outline-light btn-sm">
                    Próxima Semana <i class="bi bi-chevron-right"></i>
                </a>
                <a href="/professor/painel" class="btn btn-primary btn-sm ms-3">Voltar ao Painel</a>
            </div>
        </div>
    </div>

    <div class="table-responsive shadow-sm rounded bg-white p-3">
        <table class="table table-bordered text-center align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th style="width: 100px;">Hora</th>
                    <th th:each="dia : ${dias}" class="py-3">
                        <span class="d-block fw-bold" th:text="${#temporals.format(dia, 'EEEE')}">Segunda</span>
                        <small class="text-muted" th:text="${#temporals.format(dia, 'dd/MM')}">19/02</small>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${horas}">
                    <td class="fw-bold bg-light text-secondary" th:text="${h + ':00'}">08:00</td>
                    
                    <td th:each="dia : ${dias}" class="grid-cell p-1">
                        <div th:with="disp=${null}">
                            <form th:action="@{/professor/agenda/alternar}" method="post">
                                <input type="hidden" name="data" th:value="${dia}">
                                <input type="hidden" name="hora" th:value="${h}">
                                
                                <th:block th:with="item=${disponibilidades.?[data == __${dia}__ && hora == __${h}__]}">
                                    
                                    <button th:if="${not #lists.isEmpty(item)}" 
                                            type="submit" 
                                            th:class="${item[0].reservado} ? 'btn btn-sm btn-reserved w-100 py-2' : 'btn btn-sm btn-available w-100 py-2'"
                                            th:disabled="${item[0].reservado}">
                                        <i th:if="${item[0].reservado}" class="bi bi-lock-fill"></i>
                                        <span th:text="${item[0].reservado} ? 'Ocupado' : 'Disponível'"></span>
                                    </button>

                                    <button th:if="${#lists.isEmpty(item)}" 
                                            type="submit" 
                                            class="btn btn-sm btn-closed w-100 py-2">
                                        <i class="bi bi-plus-lg small"></i> Abrir
                                    </button>
                                </th:block>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4 d-flex gap-4 justify-content-center">
        <div class="small"><span class="badge btn-closed border text-dark">&nbsp;&nbsp;</span> Horário Fechado</div>
        <div class="small"><span class="badge btn-available border text-dark">&nbsp;&nbsp;</span> Disponível para Alunos</div>
        <div class="small"><span class="badge btn-reserved border text-dark">&nbsp;&nbsp;</span> Aula Reservada</div>
    </div>

</body>
</html>
