<!DOCTYPE html>

<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Portal do aluno da Academia BJJ - Acompanhe sua evolução, graus e agendamentos de aulas particulares.">

<title>Meu Perfil BJJ | Área do Aluno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>

body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

.bg-aluno {

background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('/img/terceira.jpg');

background-size: cover; background-position: center; background-attachment: fixed;

min-height: 100vh; padding: 20px 0;

}

.glass-card {

background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);

border: none; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);

}

.progress-container { position: relative; padding: 20px 0 35px 0; }

.bjj-belt-progress {

background-color: #e9ecef; border: 1px solid #dee2e6; height: 25px;

overflow: visible; border-radius: 12px;

}

.marker {

position: absolute; top: 15px; width: 2px; height: 35px;

background-color: #000; z-index: 2;

}

.marker-label {

position: absolute; top: 40px; font-size: 0.7rem;

font-weight: bold; transform: translateX(-50%); color: #444;

}

.profile-img { width: 150px; height: 150px; object-fit: cover; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

.btn-gold { background-color: #FFD700; color: #000; border: none; transition: 0.3s; }

.btn-gold:hover { background-color: #e6c200; transform: translateY(-2px); }



/* Estilo Extra para o Modal de Gamificação */

.modal-gamification .modal-content { border-radius: 30px; border: none; overflow: hidden; }

.comic-text { font-family: 'Comic Sans MS', cursive, sans-serif; color: #0d6efd; }

</style>

</head>

<body>

<div class="bg-aluno">

<div class="container mt-2 mb-5">

<header class="d-flex justify-content-between align-items-center mb-4 p-3 glass-card shadow-sm">

<h1 class="h3 text-primary fw-bold mb-0"><i class="bi bi-person-badge" aria-hidden="true"></i> Perfil do Aluno</h1>

<form th:action="@{/logout}" method="post">

<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

<button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Sair</button>

</form>

</header>



<div class="row g-4">

<aside class="col-md-4">

<div class="card glass-card text-center p-4 h-100">

<img th:src="@{/aluno/foto/{id}(id=${aluno.id})}" class="rounded-circle profile-img mx-auto mb-3"

alt="Foto de perfil do aluno"

onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">

<h2 class="h4 fw-bold mb-0 text-dark" th:text="${aluno.nome}">Nome</h2>


<div class="my-3">

<span class="badge bg-dark fs-6 px-4 py-2" th:text="'FAIXA ' + ${aluno.faixa}"></span>

</div>



<div class="mt-3 p-3 bg-light rounded-3 text-start">

<p class="mb-2 text-muted small fw-bold text-uppercase">Matrícula Regular</p>

<div class="d-flex align-items-center mb-2 text-dark">

<i class="bi bi-people-fill me-2 text-primary"></i>

<span th:text="${aluno.turma != null ? aluno.turma.nome : 'Sem Turma'}"></span>

</div>

<div class="d-flex align-items-center text-dark">

<i class="bi bi-clock-fill me-2 text-primary"></i>

<span th:text="${aluno.turma != null ? aluno.turma.horario : '--:--'}"></span>

</div>

</div>

</div>

</aside>



<main class="col-md-8">

<section class="card glass-card p-4 mb-4">

<h3 class="h5 fw-bold mb-3 text-primary"><i class="bi bi-bar-chart-fill me-2" aria-hidden="true"></i>Jornada para a Próxima Faixa</h3>


<div class="progress-container">

<div class="progress bjj-belt-progress">

<div class="progress-bar bg-success progress-bar-striped progress-bar-animated"

role="progressbar"

th:style="'width: ' + ${aluno.percentualProgresso} + '%'"

th:aria-valuenow="${aluno.percentualProgresso}"

aria-valuemin="0"

aria-valuemax="100">

</div>

<div class="marker" style="left: 25%;"><span class="marker-label">1º Grau</span></div>

<div class="marker" style="left: 50%;"><span class="marker-label">2º Grau</span></div>

<div class="marker" style="left: 75%;"><span class="marker-label">3º Grau</span></div>

</div>

</div>



<div class="row mt-2 g-2">

<div class="col-sm-6">

<div th:if="${aluno.percentualProgresso < 100}">

<button class="btn btn-secondary w-100 fw-bold"

onclick="alert('Você está quase lá, continue assim! Faltam algumas aulas para completar sua meta.')">

SOLICITAR MUDANÇA DE FAIXA

</button>

</div>

<div th:if="${aluno.percentualProgresso >= 100}">

<form th:action="@{/aluno/solicitar-faixa}" method="post">

<button type="submit" class="btn btn-gold w-100 fw-bold"

th:disabled="${aluno.solicitouMudanca}">

<span th:text="${aluno.solicitouMudanca ? 'SOLICITAÇÃO ENVIADA' : 'MUDAR DE FAIXA AGORA!'}"></span>

</button>

</form>

</div>

</div>

<div class="col-sm-6">

<a th:href="@{/aluno/agendar-aula}" class="btn btn-primary fw-bold w-100">AGENDAR PARTICULAR</a>

</div>

</div>

</section>



<section class="card glass-card p-4 h-100">

<h3 class="h5 fw-bold mb-3 text-secondary border-bottom pb-2">Próximos Compromissos</h3>

<div class="table-responsive">

<table class="table table-hover table-aulas mb-0">

<thead>

<tr>

<th>Mestre</th>

<th>Data / Hora</th>

<th>Status</th>

</tr>

</thead>

<tbody>

<tr th:each="aula : ${aulas}">

<td class="fw-bold" th:text="${aula.professor.nome}"></td>

<td th:text="${#temporals.format(aula.dataHora, 'dd/MM/yyyy HH:mm')}"></td>

<td>

<span th:if="${aula.status == 'PENDENTE'}" class="badge bg-warning text-dark">Pendente</span>

<span th:if="${aula.status == 'CONFIRMADA'}" class="badge bg-success">Confirmada</span>

<span th:if="${aula.status == 'CONCLUIDA'}" class="badge bg-primary">Concluída</span>

</td>

</tr>

<tr th:if="${#lists.isEmpty(aulas)}">

<td colspan="3" class="text-center text-muted py-4">Nenhuma aula agendada.</td>

</tr>

</tbody>

</table>

</div>

</section>

</main>

</div>

</div>

</div>



<div th:if="${showGamificationCard}" class="modal fade modal-gamification" id="gamificationModal" tabindex="-1" aria-labelledby="gamificationModalLabel" aria-hidden="true">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content shadow-lg border-0">

<div class="modal-body p-0 text-center">

<img th:src="@{'/img/' + ${cardImagem}}" class="img-fluid w-100 shadow-sm" th:alt="${cardFrase}">


<div class="p-4">

<h2 class="fw-bold comic-text mb-2">Gefeliciteerd!</h2>

<p class="fs-4 text-dark mb-4" th:text="${cardFrase}">Mensagem de parabéns</p>

<button type="button" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow-sm" data-bs-dismiss="modal">OSS!</button>

</div>

</div>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script th:if="${showGamificationCard}">

window.addEventListener('DOMContentLoaded', (event) => {

const myModal = new bootstrap.Modal(document.getElementById('gamificationModal'));

myModal.show();

});

</script>



</body>

</html>
