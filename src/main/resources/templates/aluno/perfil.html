<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil BJJ | Área do Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body, html { height: 100%; margin: 0; }
        .bg-aluno {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('/img/terceira.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; padding: 20px 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border: none; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .bjj-belt-progress { background-color: #222; border: 2px solid #000; height: 30px; position: relative; overflow: hidden; border-radius: 8px; }
        .stripe-mark { border-right: 4px solid #fff; height: 100%; position: absolute; z-index: 2; }
        .profile-img { width: 150px; height: 150px; object-fit: cover; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .table-aulas { font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="bg-aluno">
        <div class="container mt-2 mb-5">
            
            <div th:if="${param.sucessoAgendamento}" class="alert alert-success alert-dismissible fade show shadow mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <strong>OSS!</strong> Sua solicitação de aula foi enviada ao mestre.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 p-3 glass-card shadow-sm">
                <h2 class="text-primary fw-bold mb-0"><i class="bi bi-person-badge"></i> Perfil do Aluno</h2>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Sair</button>
                </form>
            </div>

            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card glass-card text-center p-4">
                        <img th:src="@{/aluno/foto/{id}(id=${aluno.id})}" class="rounded-circle profile-img mx-auto mb-3"
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">
                        
                        <h4 class="fw-bold mb-0 text-dark" th:text="${aluno.nome}">Nome</h4>
                        <div class="my-3">
                            <span class="badge bg-dark fs-6 px-4 py-2" th:text="'FAIXA ' + ${aluno.faixa}"></span>
                        </div>

                        <div class="mt-3 p-3 bg-light rounded text-start">
                            <p class="small mb-1"><strong>WhatsApp:</strong> <span th:text="${aluno.telefone}"></span></p>
                            <p class="small mb-0"><strong>Matrícula:</strong> <span th:text="${#temporals.format(aluno.dataMatricula, 'dd/MM/yyyy')}"></span></p>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card glass-card p-4 mb-4">
                        <h5 class="fw-bold mb-3 text-primary"><i class="bi bi-bar-chart-fill me-2"></i>Jornada Técnica</h5>
                        <div class="d-flex justify-content-between mb-1">
                            <small class="fw-bold">Progresso para Nova Faixa</small>
                            <small th:text="${aluno.aulasAssistidas + ' / ' + aluno.metaAulasNovaFaixa + ' aulas'}"></small>
                        </div>
                        <div class="progress bjj-belt-progress mb-3">
                            <div class="progress-bar bg-success progress-bar-striped" 
                                 th:style="'width: ' + (${aluno.aulasAssistidas} * 100 / ${aluno.metaAulasNovaFaixa}) + '%'"></div>
                        </div>
                        <a th:href="@{/aluno/agendar-aula}" class="btn btn-primary fw-bold py-2">
                            <i class="bi bi-calendar-plus me-2"></i>AGENDAR NOVA AULA PARTICULAR
                        </a>
                    </div>

                    <div class="card glass-card p-4">
                        <h5 class="fw-bold mb-3 text-secondary border-bottom pb-2">
                            <i class="bi bi-calendar-check me-2"></i>Minhas Aulas Agendadas
                        </h5>
                        <div class="table-responsive">
                            <table class="table table-hover table-aulas mb-0">
                                <thead>
                                    <tr>
                                        <th>Mestre</th>
                                        <th>Data / Hora</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="aula : ${aulas}">
                                        <td class="fw-bold" th:text="${aula.professor.nome}"></td>
                                        <td>
                                            <span th:text="${#temporals.format(aula.dataHora, 'dd/MM/yyyy')}"></span>
                                            <small class="text-muted d-block" th:text="${#temporals.format(aula.dataHora, 'HH:mm') + 'h'}"></small>
                                        </td>
                                        <td>
                                            <span th:if="${aula.status == 'PENDENTE'}" class="badge bg-warning text-dark">Pendente</span>
                                            <span th:if="${aula.status == 'CONFIRMADA'}" class="badge bg-success">Confirmada</span>
                                            <span th:if="${aula.status == 'RECUSADA'}" class="badge bg-danger">Recusada</span>
    										<span th:if="${aula.status == 'CONCLUIDA'}" class="badge bg-primary">Concluída</span>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(aulas)}">
                                        <td colspan="3" class="text-center text-muted py-3">Nenhuma aula agendada.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
