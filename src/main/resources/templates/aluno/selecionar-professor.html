<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione um de nossos mestres qualificados na DOJODAN para agendar sua aula particular de Jiu-Jitsu.">
    <title>Escolha seu Mestre | DOJODAN</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .bg-selecao {
            /* Aumentei levemente a opacidade do gradiente para garantir contraste do texto branco */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.85)), url('/img/terceira.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; padding: 20px;
        }
        .btn-top-left {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.15); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.85rem;
            transition: 0.3s; backdrop-filter: blur(8px);
        }
        .btn-top-left:hover { background: rgba(255, 255, 255, 0.25); color: #ffffff; border-color: #ffffff; }
        
        .header-section { margin-top: 60px; margin-bottom: 40px; text-align: center; color: #ffffff; }
        .header-section h1 { letter-spacing: 3px; font-weight: 800; text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); }
        
        .prof-list-container { max-width: 600px; margin: 0 auto; width: 100%; }
        
        .prof-item {
            /* Fundo levemente mais opaco para contraste WCAG */
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px;
            margin-bottom: 15px; padding: 20px; display: flex; align-items: center; 
            justify-content: space-between; transition: 0.3s;
        }
        .prof-item:hover { background: rgba(255, 255, 255, 0.18); border-color: rgba(255, 255, 255, 0.5); transform: translateY(-2px); }
        
        .prof-info { color: #ffffff; }
        .prof-name { font-weight: 700; font-size: 1.2rem; margin: 0; display: block; }
        /* Texto secundário escurecido para não sumir no fundo */
        .prof-rank { font-size: 0.8rem; text-transform: uppercase; color: #e0e0e0; letter-spacing: 1px; font-weight: 600; }
        
        .btn-select { 
            background: #ffffff; color: #000000; border: none; padding: 10px 24px; 
            border-radius: 8px; font-weight: 700; font-size: 0.85rem; 
            text-transform: uppercase; transition: 0.3s; text-decoration: none; 
        }
        .btn-select:hover { background: #f0f0f0; transform: scale(1.05); color: #000000; }
        
        .empty-state { color: #cccccc; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="bg-selecao">
        <a th:href="@{/aluno/perfil}" class="btn-top-left">
            <i class="bi bi-chevron-left" aria-hidden="true"></i> Voltar ao Perfil
        </a>

        <main class="container">
            <header class="header-section">
                <h1 class="display-6">MESTRES DISPONÍVEIS</h1>
                <p class="fs-5" style="color: #d1d1d1;">Selecione um mestre para agendar sua aula</p>
            </header>

            <div class="prof-list-container">
                <article th:each="p : ${professores}" class="prof-item">
                    <div class="prof-info">
                        <span class="prof-rank">Mestre • Faixa <span th:text="${p.faixa}"></span></span>
                        <h2 class="prof-name" th:text="${p.nome}">Nome do Professor</h2>
                    </div>
                    <a th:href="@{/aluno/agendar-aula/professor/{id}(id=${p.id})}" 
                       class="btn btn-select"
                       th:aria-label="'Agendar aula com ' + ${p.nome}">
                       Agendar
                    </a>
                </article>

                <div th:if="${#lists.isEmpty(professores)}" class="empty-state">
                    <i class="bi bi-person-x fs-1" aria-hidden="true"></i>
                    <p class="mt-2 fs-5">Nenhum mestre disponível no momento.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
