<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha seu Mestre | DOJODAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; }
        .bg-selecao {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('/img/terceira.jpg'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; flex-direction: column; padding: 20px;
        }
        .btn-top-left {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px; border-radius: 10px; text-decoration: none; font-size: 0.85rem;
            transition: 0.3s; backdrop-filter: blur(5px);
        }
        .btn-top-left:hover { background: rgba(255, 255, 255, 0.2); color: white; border-color: white; }
        .header-section { margin-top: 60px; margin-bottom: 40px; text-align: center; color: white; }
        .header-section h1 { letter-spacing: 3px; font-weight: 800; text-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        .prof-list-container { max-width: 600px; margin: 0 auto; width: 100%; }
        .prof-item {
            background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
            margin-bottom: 15px; padding: 20px; display: flex; align-items: center; justify-content: space-between; transition: 0.3s;
        }
        .prof-item:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(255, 255, 255, 0.4); transform: scale(1.02); }
        .prof-info { color: white; }
        .prof-name { font-weight: 700; font-size: 1.1rem; margin: 0; display: block; }
        .prof-rank { font-size: 0.75rem; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); letter-spacing: 1px; }
        .btn-select { background: white; color: black; border: none; padding: 8px 20px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; text-decoration: none; }
        .btn-select:hover { background: #e0e0e0; box-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
        .empty-state { color: rgba(255, 255, 255, 0.5); text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="bg-selecao">
        <a th:href="@{/aluno/perfil}" class="btn-top-left"><i class="bi bi-chevron-left me-1"></i> Perfil</a>
        <div class="container">
            <div class="header-section">
                <h1 class="display-6">MESTRES</h1>
                <p class="opacity-50">Selecione para agendar sua aula</p>
            </div>
            <div class="prof-list-container">
                <div th:each="p : ${professores}" class="prof-item">
                    <div class="prof-info">
                        <span class="prof-rank">MESTRE • FAIXA <span th:text="${p.faixa}"></span></span>
                        <span class="prof-name" th:text="${p.nome}"></span>
                    </div>
                    <a th:href="@{/aluno/agendar-aula/professor/{id}(id=${p.id})}" class="btn btn-select">Agendar</a>
                </div>
                <div th:if="${#lists.isEmpty(professores)}" class="empty-state">
                    <i class="bi bi-person-x fs-1"></i>
                    <p class="mt-2">Nenhum mestre disponível no momento.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
