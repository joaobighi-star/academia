<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Aula - DOJODAN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* FUNDO COM A IMAGEM TERCEIRA */
        .bg-agendamento {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.7)), 
                              url('/img/terceira.jpg'); 
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARD COMPACTO E TRANSPARENTE */
        .card-glass {
            width: 90%;
            max-width: 380px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        .card-title {
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* ESTILO DOS CAMPOS */
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .form-select, .form-control {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            border-radius: 10px;
        }

        .form-select option {
            background: #222; /* Fundo das opções do select */
            color: white;
        }

        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* BOTÕES NA PARTE SUPERIOR */
        .btn-action {
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            padding: 10px;
        }

        .btn-submit {
            background-color: #ffffff;
            color: #000;
            border: none;
        }

        .btn-submit:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-back {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="bg-agendamento">
        <div class="card card-glass border-0">
            <div class="card-body">
                
                <div class="text-center mb-4">
                    <i class="bi bi-calendar2-check mb-2" style="font-size: 2.5rem;"></i>
                    <h4 class="card-title mt-2">AGENDAR AULA</h4>
                </div>

                <form th:action="@{/aluno/agendar-aula/salvar}" method="post">
                    
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <a href="/aluno/perfil" class="btn btn-back btn-action w-100">
                                <i class="bi bi-arrow-left"></i> Voltar
                            </a>
                        </div>
                        <div class="col-6">
                            <button type="submit" class="btn btn-submit btn-action w-100">
                                Enviar
                            </button>
                        </div>
                    </div>

                    <hr style="border-color: rgba(255,255,255,0.1);">

                    <div class="mb-3">
                        <label class="form-label">Professor</label>
                        <select name="professorId" class="form-select" required>
                            <option value="" disabled selected>Escolha o mestre...</option>
                            <option th:each="p : ${professores}" th:value="${p.id}" 
                                    th:text="${p.nome + ' (' + p.faixa + ')'}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Data e Horário</label>
                        <input type="datetime-local" name="dataHora" class="form-control" required>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
