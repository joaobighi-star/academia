<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservar Aula Particular</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container py-4">

    <div class="card shadow-sm mb-4 border-0">
        <div class="card-body d-flex justify-content-between align-items-center bg-primary text-white rounded">
            <div>
                <h4 class="mb-0">Agendar com Mestre <span th:text="${professor.nome}"></span></h4>
                <small>Escolha um horário disponível (verde) para solicitar sua aula</small>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/aluno/agendar-aula(professorId=${professor.id}, dataBase=${semanaAnterior})}" class="btn btn-outline-light btn-sm">&lt; Anterior</a>
                <a th:href="@{/aluno/agendar-aula(professorId=${professor.id}, dataBase=${proximaSemana})}" class="btn btn-outline-light btn-sm">Próxima &gt;</a>
                <a href="/aluno/perfil" class="btn btn-light btn-sm">Cancelar</a>
            </div>
        </div>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-bordered text-center align-middle">
            <thead class="table-light">
                <tr>
                    <th>Hora</th>
                    <th th:each="dia : ${dias}">
                        <span class="d-block fw-bold" th:text="${#temporals.format(dia, 'EEEE')}"></span>
                        <small class="text-muted" th:text="${#temporals.format(dia, 'dd/MM')}"></small>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${horas}">
                    <td class="fw-bold bg-light" th:text="${h + ':00'}"></td>
                    <td th:each="dia : ${dias}" style="min-width: 100px; height: 60px;">
                        
                        <th:block th:with="item=${disponibilidades.?[data == __${dia}__ && hora == __${h}__]}">
                            
                            <form th:if="${not #lists.isEmpty(item)}" th:action="@{/aluno/agendar/confirmar}" method="post">
                                <input type="hidden" name="disponibilidadeId" th:value="${item[0].id}">
                                <button type="submit" class="btn btn-success btn-sm w-100 py-2">
                                    <i class="bi bi-calendar-plus"></i> Reservar
                                </button>
                            </form>

                            <span th:if="${#lists.isEmpty(item)}" class="text-muted small">-</span>

                        </th:block>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
