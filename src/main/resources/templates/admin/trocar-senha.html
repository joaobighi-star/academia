<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Segurança do Administrador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card bg-secondary text-white shadow-lg">
                    <div class="card-header text-center"><h4>Alteração de Senha Mestre</h4></div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/painel-mestre-bjj/executar-troca}" method="post">
                            <div class="mb-3">
                                <label>Senha Atual</label>
                                <input type="password" name="senhaAtual" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Nova Senha</label>
                                <input type="password" name="novaSenha" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Confirme a Nova Senha</label>
                                <input type="password" name="confirmarSenha" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Atualizar Credenciais</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
