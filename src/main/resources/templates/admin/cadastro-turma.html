<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configurar Turma - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0"><i class="bi bi-calendar-check"></i> Criar Nova Turma</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/painel-mestre-bjj/turmas/salvar}" th:object="${turma}" method="post">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nome da Turma</label>
                            <input type="text" th:field="*{nome}" class="form-control" placeholder="Ex: Iniciantes Manhã" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Professor Responsável</label>
                            <select th:field="*{professorResponsavel}" class="form-select" required>
                                <option value="">Selecione um Professor</option>
                                <option th:each="p : ${professores}" 
                                        th:value="${p.id}" th:text="${p.nome}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-success">Dias de Treino</label>
                        <div class="d-flex flex-wrap gap-3 p-3 border rounded bg-white shadow-sm">
                            <div th:each="dia : ${todosDias}" class="form-check">
                                <input class="form-check-input" type="checkbox" 
                                       th:field="*{diasSemana}" 
                                       th:value="${dia}" 
                                       th:id="${'dia-' + dia}">
                                <label class="form-check-label fw-semibold" 
                                       th:for="${'dia-' + dia}" 
                                       th:text="${dia.descricao}"></label>
                            </div>
                        </div>
                        <small class="text-muted">Selecione todos os dias em que esta turma acontece.</small>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Horário</label>
                            <input type="text" th:field="*{horario}" class="form-control" placeholder="Ex: 08:00 - 09:30" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Faixa Etária</label>
                            <select th:field="*{faixaEtaria}" class="form-select">
                                <option value="Infantil">Infantil</option>
                                <option value="Juvenil">Juvenil</option>
                                <option value="Adulto">Adulto</option>
                                <option value="Master">Master</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Nível de Faixa</label>
                            <input type="text" th:field="*{nivelFaixa}" class="form-control" placeholder="Ex: Todas as faixas">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/painel-mestre-bjj" class="btn btn-secondary px-4">Voltar</a>
                        <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">Criar Turma</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
