<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Professores - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Professores Cadastrados</h2>
            <a th:href="@{/painel-mestre-bjj/professores/novo}" class="btn btn-dark">Novo Professor</a>
        </div>

        <div class="card shadow">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Faixa</th>
                            <th>Especialidade</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${professores}">
                            <td th:text="${p.nome}"></td>
                            <td th:text="${p.usuario.email}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${p.faixa}"></span>
                            </td>
                            <td th:text="${p.especialidade}"></td>
                            <td>
                                <a th:href="@{/painel-mestre-bjj/professores/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/painel-mestre-bjj/professores/excluir/{id}(id=${p.id})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   onclick="return confirm('Tem certeza que deseja excluir este professor?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(professores)}">
                            <td colspan="5" class="text-center py-4">Nenhum professor cadastrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{/painel-mestre-bjj}" class="btn btn-secondary">Voltar ao Painel</a>
        </div>
    </div>
</body>
</html>
