<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulário de gestão de professores da academia de Jiu-Jitsu. Cadastre novos mestres e suas especialidades.">
    <title>Lista de Professores - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Professores Cadastrados</h1>
            <a th:href="@{/painel-mestre-bjj/professores/novo}" class="btn btn-dark">Novo Professor</a>
        </div>

        <div class="card shadow">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col">Nome</th>
                            <th scope="col">E-mail</th>
                            <th scope="col">Faixa</th>
                            <th scope="col">Especialidade</th>
                            <th scope="col">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${professores}">
                            <td th:text="${p.nome}"></td>
                            <td th:text="${p.usuario.email}"></td>
                            <td>
                                <span class="badge bg-secondary" th:text="${p.faixa}"></span>
                            </td>
                            <td th:text="${p.especialidade}"></td>
                            <td>
                                <a th:href="@{/painel-mestre-bjj/professores/editar/{id}(id=${p.id})}" 
                                   class="btn btn-sm btn-outline-primary" 
                                   aria-label="Editar professor">
                                    <i class="bi bi-pencil" aria-hidden="true"></i>
                                </a>
                                <a th:href="@{/painel-mestre-bjj/professores/excluir/{id}(id=${p.id})}" 
                                   class="btn btn-sm btn-outline-danger" 
                                   aria-label="Excluir professor"
                                   onclick="return confirm('Tem certeza que deseja excluir este professor?')">
                                    <i class="bi bi-trash" aria-hidden="true"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(professores)}">
                            <td colspan="5" class="text-center py-4">Nenhum professor cadastrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="mt-3">
            <a th:href="@{/painel-mestre-bjj}" class="btn btn-secondary">Voltar ao Painel</a>
        </div>
    </main>
</body>
</html>
