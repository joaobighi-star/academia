<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Área de matrícula e edição de alunos.">
    <title>Gerenciar Aluno - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .alert-warning-contrast { background-color: #fff3cd; border: 1px solid #856404; color: #433302; }
        .card { border-radius: 15px; overflow: hidden; }
        .card-header { background: linear-gradient(45deg, #0d6efd, #0b5ed7); }
    </style>
</head>
<body class="bg-light">
    <main class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header text-white py-3">
                <h1 class="h3 mb-0 text-center" th:text="${aluno.id == null ? 'Cadastrar Novo Aluno' : 'Editar Aluno'}">Gerenciar Aluno</h1>
            </div>
            <div class="card-body p-4">
                <form th:action="@{/painel-mestre-bjj/alunos/salvar}" th:object="${aluno}" method="post" enctype="multipart/form-data">
                    
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{usuario.id}">
                    
                    <div class="mb-4 p-3 border rounded bg-white shadow-sm border-primary">
                        <label for="turmaSelect" class="form-label fw-bold text-primary">Vincular a uma Turma</label>
                        <select th:field="*{turma}" id="turmaSelect" class="form-select form-select-lg" required>
                            <option value="">-- Selecione a Turma --</option>
                            <option th:each="t : ${turmas}" 
                                    th:value="${t.id}" 
                                    th:text="${t.nome + ' (' + t.horario + ') - Prof: ' + t.professorResponsavel.nome}"></option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label fw-bold">Nome Completo</label>
                            <input type="text" th:field="*{nome}" id="nome" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="telefone" class="form-label fw-bold">Telefone</label>
                            <input type="text" th:field="*{telefone}" id="telefone" class="form-control" placeholder="+31 0 00000-0000" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="dataNascimento" class="form-label fw-bold">Data de Nascimento</label>
                            <input type="date" th:field="*{dataNascimento}" id="dataNascimento" class="form-control" required onchange="checarMenorDeIdade()">
                        </div>
                    </div>
                    
                    <div class="row" id="campoResponsavel" th:style="${aluno.nomeResponsavel != null && !aluno.nomeResponsavel.isEmpty() ? 'display: block;' : 'display: none;'}" aria-live="polite">
                        <div class="col-md-12 mb-3">
                            <div class="alert alert-warning-contrast py-2 mb-0 shadow-sm">
                                <label for="inputResponsavel" class="form-label fw-bold">Nome do Responsável Legal (Menor de Idade)</label>
                                <input type="text" th:field="*{nomeResponsavel}" class="form-control" id="inputResponsavel">
                            </div>
                        </div>
                    </div>

                    <hr>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="email" class="form-label fw-bold">E-mail (Login)</label>
                            <input type="email" th:field="*{usuario.email}" id="email" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="bsn" class="form-label fw-bold">BSN (Senha Inicial)</label>
                            <input type="text" th:field="*{bsn}" id="bsn" class="form-control" required maxlength="9" placeholder="9 dígitos">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="dataMatricula" class="form-label fw-bold">Data de Matrícula</label>
                            <input type="date" th:field="*{dataMatricula}" id="dataMatricula" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="faixa" class="form-label fw-bold">Faixa Atual</label>
                            <select th:field="*{faixa}" id="faixa" class="form-select">
                                <option th:each="f : ${T(com.academia.enums.Faixa).values()}" 
                                        th:value="${f}" 
                                        th:text="${f.nomeExibicao}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="iban" class="form-label text-primary fw-bold">Número da Conta (IBAN)</label>
                            <input type="text" th:field="*{iban}" id="iban" class="form-control" required maxlength="34" placeholder="Ex: NL99 BJJB 0000 1234 56">
                        </div>
                    </div>

                    <div class="row" th:if="${aluno.id != null}">
                        <div class="col-md-12 mb-3">
                            <label for="statusMensalidade" class="form-label fw-bold text-danger">Status do Pagamento</label>
                            <select th:field="*{statusMensalidade}" id="statusMensalidade" class="form-select border-danger">
                                <option th:each="s : ${T(com.academia.enums.StatusMensalidade).values()}" 
                                        th:value="${s}" 
                                        th:text="${s}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="fotoPerfil" class="form-label fw-bold">Alterar Foto</label>
                        <input type="file" name="imagem" id="fotoPerfil" class="form-control" accept="image/*">
                        <div class="form-text">Deixe em branco para manter a foto atual.</div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a th:href="@{/painel-mestre-bjj/alunos/listar}" class="btn btn-secondary px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        function checarMenorDeIdade() {
            const dataNasc = document.getElementById('dataNascimento').value;
            const campoResp = document.getElementById('campoResponsavel');
            const inputResp = document.getElementById('inputResponsavel');
            
            if (dataNasc) {
                const hoje = new Date();
                const nasc = new Date(dataNasc);
                let idade = hoje.getFullYear() - nasc.getFullYear();
                const mes = hoje.getMonth() - nasc.getMonth();
                if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) idade--;
                
                if (idade < 18) {
                    campoResp.style.display = 'block';
                    inputResp.required = true;
                } else {
                    campoResp.style.display = 'none';
                    inputResp.required = false;
                }
            }
        }
        window.onload = checarMenorDeIdade;
    </script>
</body>
</html>
