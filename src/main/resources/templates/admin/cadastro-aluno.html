<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matrícula de Aluno - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Cadastrar Novo Aluno</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/painel-mestre-bjj/alunos/salvar}" th:object="${aluno}" method="post" enctype="multipart/form-data">
                    
                    <div class="mb-4 p-3 border rounded bg-white shadow-sm">
                        <label class="form-label fw-bold text-primary">Vincular a uma Turma</label>
                        <select th:field="*{turma}" class="form-select form-select-lg" required>
                            <option value="">-- Selecione a Turma --</option>
                            <option th:each="t : ${turmas}" 
                                    th:value="${t.id}" 
                                    th:text="${t.nome + ' (' + t.horario + ') - Prof: ' + t.professorResponsavel.nome}"></option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nome Completo</label>
                            <input type="text" th:field="*{nome}" class="form-control" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Telefone</label>
                            <input type="text" th:field="*{telefone}" class="form-control" placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Data de Nascimento</label>
                            <input type="date" th:field="*{dataNascimento}" id="dataNascimento" class="form-control" required onchange="checarMenorDeIdade()">
                        </div>
                    </div>
                    
                    <div class="row" id="campoResponsavel" style="display: none;">
                        <div class="col-md-12 mb-3">
                            <div class="alert alert-warning py-2 mb-0 border-warning">
                                <label class="form-label fw-bold text-dark">Nome do Responsável Legal (Aluno Menor de Idade)</label>
                                <input type="text" th:field="*{nomeResponsavel}" class="form-control" id="inputResponsavel">
                            </div>
                        </div>
                    </div>

                    <hr>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">E-mail (Login do Aluno)</label>
                            <input type="email" th:field="*{usuario.email}" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">CPF (Senha Inicial)</label>
                            <input type="text" th:field="*{cpf}" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Data de Matrícula</label>
                            <input type="date" th:field="*{dataMatricula}" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Faixa Atual</label>
                            <select th:field="*{faixa}" class="form-select">
                                <option th:each="f : ${T(com.academia.enums.Faixa).values()}" 
                                        th:value="${f}" th:text="${f}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-primary fw-bold">Vencimento da Mensalidade (Dia)</label>
                            <input type="date" th:field="*{dataVencimento}" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Foto para o Perfil</label>
                        <input type="file" name="imagem" class="form-control" accept="image/*" required>
                        <div class="form-text">Envie uma foto clara do rosto do aluno para o sistema.</div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/painel-mestre-bjj" class="btn btn-secondary px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">Finalizar Matrícula</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function checarMenorDeIdade() {
            const dataNasc = document.getElementById('dataNascimento').value;
            const campoResp = document.getElementById('campoResponsavel');
            const inputResp = document.getElementById('inputResponsavel');
            
            if (dataNasc) {
                const hoje = new Date();
                const nasc = new Date(dataNasc);
                let idade = hoje.getFullYear() - nasc.getFullYear();
                const mes = hoje.getMonth() - nasc.getMonth();
                
                if (mes < 0 || (mes === 0 && hoje.getDate() < nasc.getDate())) {
                    idade--;
                }
                
                if (idade < 18) {
                    campoResp.style.display = 'block';
                    inputResp.required = true;
                } else {
                    campoResp.style.display = 'none';
                    inputResp.required = false;
                    inputResp.value = ""; 
                }
            }
        }
    </script>
</body>
</html>
