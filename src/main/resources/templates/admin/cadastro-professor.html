<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualização completa de todos os professores cadastrados, suas faixas e informações de contato.">
    <title>Gerenciar Professor - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <main class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h1 class="h3 mb-0" th:text="${professor.id == null ? 'Cadastrar Novo Professor' : 'Editar Professor'}"></h1>
            </div>
            <div class="card-body">
                <form th:action="@{/painel-mestre-bjj/professores/salvar}" th:object="${professor}" method="post">
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" th:field="*{nome}" id="nome" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">E-mail de Acesso</label>
                            <input type="email" th:field="*{usuario.email}" id="email" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="faixa" class="form-label">Faixa</label>
                            <select th:field="*{faixa}" id="faixa" class="form-select">
                                <option value="" disabled selected>Selecione uma faixa</option>
                                <option th:each="f : ${T(com.academia.enums.Faixa).values()}" 
                                        th:value="${f}" th:text="${f}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="especialidade" class="form-label">Especialidade</label>
                            <input type="text" th:field="*{especialidade}" id="especialidade" class="form-control">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a th:href="@{/painel-mestre-bjj/professores/listar}" class="btn btn-secondary">Voltar</a>
                        <button type="submit" class="btn btn-dark" th:text="${professor.id == null ? 'Cadastrar' : 'Atualizar'}"></button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
