<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Professor - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h3>Cadastrar Novo Professor</h3>
            </div>
            <div class="card-body">
                <form th:action="@{/painel-mestre-bjj/professores/salvar}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" name="nome" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">E-mail de Acesso</label>
                            <input type="email" name="usuario.email" class="form-control" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Faixa</label>
                            <select name="faixa" class="form-select">
                                <option th:each="f : ${T(com.academia.enums.Faixa).values()}" 
                                        th:value="${f}" th:text="${f}"></option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Especialidade (Ex: No-Gi, Kids, Competition)</label>
                            <input type="text" name="especialidade" class="form-control">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/painel-mestre-bjj" class="btn btn-secondary">Voltar</a>
                        <button type="submit" class="btn btn-dark">Cadastrar Professor</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
