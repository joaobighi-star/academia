<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Turmas - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-grid-3x3-gap-fill text-primary"></i> Turmas da Academia</h2>
        <div class="gap-2 d-flex">
            <a href="/painel-mestre-bjj/turmas/nova" class="btn btn-success"><i class="bi bi-plus-lg"></i> Nova Turma</a>
            <a href="/painel-mestre-bjj" class="btn btn-secondary">Voltar ao Painel</a>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" th:each="t : ${turmas}">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold text-dark mb-0" th:text="${t.nome}">Nome da Turma</h5>
                        <span class="badge bg-light text-dark border" th:text="${t.faixaEtaria}">Adulto</span>
                    </div>
                    
                    <div class="mb-3">
                        <span th:each="dia : ${t.diasSemana}" 
                              class="badge bg-primary-subtle text-primary border border-primary-subtle me-1 small" 
                              style="font-size: 0.75rem;"
                              th:text="${dia.descricao}">
                        </span>
                    </div>

                    <p class="card-text small text-muted">
                        <i class="bi bi-person-badge"></i> <strong>Professor:</strong> <span th:text="${t.professorResponsavel.nome}"></span><br>
                        <i class="bi bi-clock"></i> <strong>Horário:</strong> <span th:text="${t.horario}"></span><br>
                        <i class="bi bi-info-circle"></i> <strong>Nível:</strong> <span th:text="${t.nivelFaixa}"></span>
                    </p>
                </div>
                <div class="card-footer bg-transparent border-top-0 pb-3">
                    <a th:href="@{'/painel-mestre-bjj/turmas/detalhes/' + ${t.id}}" class="btn btn-outline-primary w-100">
                        <i class="bi bi-people-fill"></i> Gerenciar Alunos (<span th:text="${t.alunos.size()}">0</span>)
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(turmas)}" class="text-center py-5">
        <i class="bi bi-calendar-x fs-1 text-muted"></i>
        <p class="mt-3 text-muted">Nenhuma turma cadastrada. Clique em "Nova Turma" para começar.</p>
    </div>
</body>
</html>
