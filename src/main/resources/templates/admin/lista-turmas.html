<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerencie as turmas da academia BJJ. Visualize horários, professores responsáveis, dias de treino e quantidade de alunos por horário.">
    <title>Gestão de Turmas - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Ajuste de contraste: Bootstrap subtle pode ser muito claro para o Lighthouse */
        .badge-contrast {
            background-color: #e7f1ff !important; /* Um pouco mais escuro que o padrão */
            color: #004a99 !important; /* Azul mais forte para garantir contraste AA */
        }
        .text-muted-dark {
            color: #555 !important; /* O text-muted padrão às vezes falha; este é mais seguro */
        }
    </style>
</head>
<body class="bg-light container py-5">
    <main>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold h2">
                <i class="bi bi-grid-3x3-gap-fill text-primary" aria-hidden="true"></i> Turmas da Academia
            </h1>
            <div class="gap-2 d-flex">
                <a th:href="@{/painel-mestre-bjj/turmas/nova}" class="btn btn-success">
                    <i class="bi bi-plus-lg" aria-hidden="true"></i> Nova Turma
                </a>
                <a th:href="@{/painel-mestre-bjj}" class="btn btn-secondary">Voltar ao Painel</a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="t : ${turmas}">
                <section class="card shadow-sm border-0 h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h2 class="h5 card-title fw-bold text-dark mb-0" th:text="${t.nome}">Nome da Turma</h2>
                            <span class="badge bg-dark text-white border" th:text="${t.faixaEtaria}">Adulto</span>
                        </div>
                        
                        <div class="mb-3" role="group" th:aria-label="'Dias de treino: ' + ${#strings.listJoin(t.diasSemana.![descricao], ', ')}">
                            <span th:each="dia : ${t.diasSemana}" 
                                  class="badge badge-contrast border me-1 small" 
                                  style="font-size: 0.75rem;"
                                  th:text="${dia.descricao}"
                                  aria-hidden="true">
                            </span>
                        </div>

                        <p class="card-text small text-muted-dark">
                            <i class="bi bi-person-badge" aria-hidden="true"></i> 
                            <strong>Professor:</strong> <span th:text="${t.professorResponsavel.nome}"></span><br>
                            <i class="bi bi-clock" aria-hidden="true"></i> 
                            <strong>Horário:</strong> <span th:text="${t.horario}"></span><br>
                            <i class="bi bi-info-circle" aria-hidden="true"></i> 
                            <strong>Nível:</strong> <span th:text="${t.nivelFaixa}"></span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0 pb-3">
                        <a th:href="@{'/painel-mestre-bjj/turmas/detalhes/' + ${t.id}}" 
                           class="btn btn-outline-primary w-100"
                           th:aria-label="'Gerenciar alunos da turma ' + ${t.nome}">
                            <i class="bi bi-people-fill" aria-hidden="true"></i> Gerenciar Alunos (<span th:text="${t.alunos.size()}">0</span>)
                        </a>
                    </div>
                </section>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(turmas)}" class="text-center py-5" role="status">
            <i class="bi bi-calendar-x fs-1 text-muted" aria-hidden="true"></i>
            <p class="mt-3 text-muted-dark">Nenhuma turma cadastrada. Clique em "Nova Turma" para começar.</p>
        </div>
    </main>
</body>
</html>
