<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visualize a lista de alunos matriculados, fotos de perfil e status de mensalidade desta turma de Jiu-Jitsu.">
    <title>Detalhes da Turma - BJJ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container py-5">
    <main class="card shadow">
        <header class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0" th:text="'Turma: ' + ${turma.nome}">Turma</h1>
            <a th:href="@{/painel-mestre-bjj/turmas/listar}" class="btn btn-sm btn-outline-light">Voltar</a>
        </header>
        
        <div class="card-body">
            <h2 class="h5 mb-3">Lista de Alunos Matriculados</h2>
            
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th scope="col">Foto</th>
                            <th scope="col">Nome</th>
                            <th scope="col">Faixa</th>
                            <th scope="col">Status Mensalidade</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${alunos}">
                            <td>
                                <img th:src="@{'/painel-mestre-bjj/alunos/foto/' + ${a.id}}" 
                                     th:alt="'Foto do aluno ' + ${a.nome}"
                                     class="rounded-circle" 
                                     style="width: 40px; height: 40px; object-fit: cover;">
                            </td>
                            <td th:text="${a.nome}">Nome</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${a.faixa}">Faixa</span>
                            </td>
                            <td>
                                <span th:class="${a.statusMensalidade.name() == 'EM_DIA' ? 'text-success fw-bold' : 'text-danger fw-bold'}" 
                                      th:text="${a.statusMensalidade}">Status</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(alunos)}" class="alert alert-info" role="alert">
                Nenhum aluno matriculado nesta turma ainda.
            </div>
        </div>
    </main>
</body>
</html>
