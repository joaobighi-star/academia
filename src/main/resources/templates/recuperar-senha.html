<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card shadow" style="max-width: 400px;">
        <div class="card-body">
            <h5 class="text-center">Esqueci minha senha</h5>
            <p class="small text-muted">Digite seu e-mail para receber uma senha temporária.</p>
            <form th:action="@{/recuperar-senha/enviar}" method="post">
                <input type="email" name="email" class="form-control mb-3" required>
                <button type="submit" class="btn btn-primary w-100">Enviar E-mail</button>
            </form>
            <div class="mt-3 text-center"><a href="/login">Voltar ao login</a></div>
        </div>
    </div>
</body>
</html>
